name: Android APK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev \
            python3-dev python3-pip zip unzip \
            zlib1g-dev cmake libltdl-dev libsqlite3-dev \
            openjdk-17-jdk zlib1g-dev cmake \
            libltdl-dev libsqlite3-dev \
            gettext autopoint

      - name: Prepare Patched p4a
        run: |
          python -m pip install --upgrade pip
          python -m pip install "cython>=3.0.0" buildozer
          git clone https://github.com/kivy/python-for-android.git p4a-custom
          rm -rf p4a-custom/pythonforandroid/recipes/libthorvg
          mkdir -p p4a-custom/pythonforandroid/recipes/libthorvg
          printf "from pythonforandroid.recipe import Recipe\n\nclass LibthorvgRecipe(Recipe):\n    name = 'libthorvg'\n    version = '0.12.0'\n    def get_include_dir(self, arch):\n        return \"\"\n    def build_arch(self, arch):\n        pass\n\nrecipe = LibthorvgRecipe()" > p4a-custom/pythonforandroid/recipes/libthorvg/__init__.py
          find p4a-custom -type f -name "*.py" -exec sed -i "s/install -U pip/install 'pip<24.0'/g" {} +
          find p4a-custom -type f -name "*.py" -exec sed -i "s/install --upgrade pip/install 'pip<24.0'/g" {} +
          sed -i '/p4a.source_dir/d' buildozer.spec
          sed -i '/p4a.branch/d' buildozer.spec
          sed -i '/^\[app\]/a p4a.source_dir = '"$(pwd)"'/p4a-custom' buildozer.spec
          echo "pip<24.0" > /tmp/pip-constraint.txt

      - name: Build with Buildozer
        env:
          PIP_CONSTRAINT: /tmp/pip-constraint.txt
        run: |
          # Czyścimy stare śmieci przed budowaniem
          rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/stockscannerpro/.gradle
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stockscannerpro-apk
          path: bin/*.apk
