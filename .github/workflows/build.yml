name: Android APK Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev \
            python3-dev python3-pip zip unzip \
            zlib1g-dev cmake libltdl-dev libsqlite3-dev \
            openjdk-17-jdk zlib1g-dev cmake \
            libltdl-dev libsqlite3-dev \
            gettext autopoint

      

      - name: Build with Buildozer
        env:
          PIP_CONSTRAINT: /tmp/pip-constraint.txt
        run: |
          # Czyścimy stare śmieci przed budowaniem
          python -m pip install buildozer cython==0.29.36
          rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/stockscannerpro/.gradle
          buildozer android debug
          
  # ==========================================
  # UPLOAD APK
  # ==========================================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
         name: apk
         path: bin/*.apk
