name: Build StockScannerPro APK

env:
  P4A_RELEASE_KEYSTORE: ""

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Linux dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            zip \
            unzip \
            tar \
            wget \
            curl \
            git \
            build-essential \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            cmake \
            openjdk-17-jdk

      - name: Clean previous build cache
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.gradle/caches

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Python dependencies
        run: |
          pip install \
            cython==0.29.33 \
            buildozer \
            virtualenv

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerPro-APK
          path: bin/*.apk
