name: Build StockScannerPro APK

on:
  workflow_dispatch:

env:
  BUILDOZER_WARN_ON_ROOT: "0"

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libffi-dev libssl-dev \
            python3-dev python3-pip zip unzip \
            zlib1g-dev cmake libltdl-dev libsqlite3-dev \
            openjdk-17-jdk zlib1g-dev cmake \
            libltdl-dev libsqlite3-dev \
            gettext autopoint

      - name: Prepare Patched p4a
        run: |
          pip uninstall -y cython
          pip install cython==0.29.36
          python -m pip install --upgrade pip
          git clone https://github.com/kivy/python-for-android.git p4a-custom
          rm -rf p4a-custom/pythonforandroid/recipes/libthorvg
          mkdir -p p4a-custom/pythonforandroid/recipes/libthorvg
          printf "from pythonforandroid.recipe import Recipe\n\nclass LibthorvgRecipe(Recipe):\n    name = 'libthorvg'\n    version = '0.12.0'\n    def get_include_dir(self, arch):\n        return \"\"\n    def build_arch(self, arch):\n        pass\n\nrecipe = LibthorvgRecipe()" > p4a-custom/pythonforandroid/recipes/libthorvg/__init__.py
          find p4a-custom -type f -name "*.py" -exec sed -i "s/install -U pip/install 'pip<24.0'/g" {} +
          find p4a-custom -type f -name "*.py" -exec sed -i "s/install --upgrade pip/install 'pip<24.0'/g" {} +
          sed -i '/p4a.source_dir/d' buildozer.spec
          sed -i '/p4a.branch/d' buildozer.spec
          sed -i '/^\[app\]/a p4a.source_dir = '"$(pwd)"'/p4a-custom' buildozer.spec
          echo "pip<24.0" > /tmp/pip-constraint.txt
          sed -i 's/version = "3.14.0"/version = "3.11.9"/g' \
          p4a-custom/pythonforandroid/recipes/python3/__init__.py

      - name: Full clean build cache
        run: |
            rm -rf .buildozer
            rm -rf bin
            rm -rf ~/.buildozer
            rm -rf ~/.gradle/caches
            rm -rf ~/.local/share/python-for-android

    
      - name: Clean caches
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf ~/.buildozer
          rm -rf ~/.gradle/caches
          rm -rf ~/.local/share/python-for-android

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Buildozer
        run: |
         rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/dists/stockscannerpro/.gradle
         pip install --upgrade pip setuptools wheel
         pip install cython==0.29.36
         pip install buildozer==1.4.0
         pip install virtualenv
         buildozer --version


      - name: Clean and build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerPro-APK
          path: bin/*.apk
          if-no-files-found: error
