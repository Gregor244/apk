name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      PIP_NO_BUILD_ISOLATION: "1"
      PIP_PREFER_BINARY: "1"
      SETUPTOOLS_USE_DISTUTILS: stdlib

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            zip unzip git curl wget \
            build-essential autoconf automake libtool pkg-config \
            cmake libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev libncursesw5-dev

      - name: Install Python packages
        run: |
          python -V
          which python
          python -m pip --version

          python -m pip install --upgrade pip==23.3.1
          python -m pip install setuptools==65.7.0 wheel==0.41.2 cython==0.29.36
          python -m pip install --no-build-isolation buildozer==1.5.0

      - name: Clean previous builds
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.cache/buildozer
          rm -rf ~/.cache/python-for-android
          rm -rf bin

      - name: Configure Android SDK
        run: |
          echo "ANDROIDSDK=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROIDAPI=33" >> $GITHUB_ENV
          echo "NDKAPI=24" >> $GITHUB_ENV

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stockscanner-apk
          path: bin/*.apk
