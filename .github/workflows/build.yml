name: Android PRO Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            build-essential \
            libffi-dev libssl-dev \
            python3-dev \
            zlib1g-dev cmake \
            libltdl-dev libsqlite3-dev \
            gettext autopoint

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install buildozer cython==0.29.36

      # =========================
      # CACHE BOOST (PRO FEATURE)
      # =========================
      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}

      - name: Clean
        run: |
          rm -rf bin

      - name: Init Buildozer
        run: |
          buildozer android update

      - name: Build APK
        run: |
          buildozer android debug deploy run

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stockscanner-pro-apk
          path: bin/*.apk
      - name: Init Buildozer
        run: |
         buildozer android update
