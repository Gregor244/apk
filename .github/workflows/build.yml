name: Build APK

on:
 workflow_dispatch:

jobs:
 build:
  runs-on: ubuntu-22.04

  steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Set up Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "17"

  - name: Install system dependencies
    run: |
      sudo apt update

      sudo apt install -y \
        git \
        zip \
        unzip \
        openjdk-17-jdk \
        autoconf \
        automake \
        libtool \
        pkg-config \
        zlib1g-dev \
        libncurses5-dev \
        libncursesw5-dev \
        cmake \
        libffi-dev \
        libssl-dev \
        build-essential \
        ccache

  - name: Clean caches
    run: |
      rm -rf .buildozer
      rm -rf ~/.buildozer
      rm -rf ~/.gradle
      rm -rf ~/.cache/pip

  - name: Install Python packages
    run: |
      python -m pip install --upgrade pip setuptools wheel
      pip install cython==0.29.36
      pip install buildozer==1.5.0

  - name: Build APK
    run: |
      buildozer android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: stockscanner-apk
      path: bin/*.apk

  - name: Upload logs
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: build-logs
      path: |
        .buildozer/**/*.log
        .buildozer/**/*.txt
