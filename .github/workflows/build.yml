name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    # Removed ANDROID_NDK_HOME so Buildozer downloads 25b automatically
    env:
      P4A_PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool \
            pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Clean
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.gradle
          rm -rf ~/.cache/pip

      - name: Install Buildozer and Dependencies
        run: |
          # Upgraded to Cython 3.0.10
          pip install cython==3.0.10 setuptools==69.5.1 wheel==0.43.0
          pip install buildozer==1.5.0
          
          # Removed the Kivy develop.zip override to use stable p4a

      - name: Build APK
        run: |
          # Unset pre-installed GitHub Actions NDK variables
          unset ANDROID_NDK
          unset ANDROID_NDK_HOME
          unset ANDROID_NDK_LATEST_HOME
          
          # Run buildozer
          buildozer android debug
