name: Build StockScannerPro APK

on:
  workflow_dispatch:

env:
  BUILDOZER_WARN_ON_ROOT: "0"
  BUILDOZER_ALLOW_AAB: "0"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            zip unzip tar wget curl git \
            build-essential autoconf automake libtool pkg-config \
            libltdl-dev \
            zlib1g-dev libncurses5-dev libffi-dev libssl-dev cmake \
            openjdk-17-jdk

      - name: Clean caches
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf ~/.buildozer
          rm -rf ~/.gradle/caches
          rm -rf ~/.local/share/python-for-android

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          pip install virtualenv
          buildozer --version

      - name: Clean and build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerPro-APK
          path: bin/*.apk
          if-no-files-found: error
