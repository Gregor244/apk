name: Build StockScannerV10 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEBIAN_FRONTEND: noninteractive
      MAKEFLAGS: -j1
      P4A_PYTHON_VERSION: "3.10"
      PIP_NO_BUILD_ISOLATION: "1"
      PIP_USE_PEP517: "0"
      PYTHONNOUSERSITE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip wget curl \
            build-essential \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev zlib1g-dev \
            cmake

      - name: Clean
        run: |
          rm -rf .buildozer ~/.buildozer ~/.gradle ~/.cache ~/.python-for-android

      # 🔥 KLUCZ: stabilne wersje toolchain
      - name: Install stable buildozer stack
        run: |
          python -m pip install --upgrade pip==23.2.1

          python -m pip install \
            setuptools==65.7.0 \
            wheel==0.38.4 \
            cython==0.29.33 \
            appdirs==1.4.4

          python -m pip install \
            buildozer==1.5.0 \
            "python-for-android==2023.9.16"

      # 🔥 FIX wheel CLI crash
      - name: Force compatible wheel
        run: |
          python -m pip install "wheel<0.38.5"

      - name: Build APK
        run: |
          buildozer android debug
