name: Build StockScannerV10 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y zip unzip git wget curl \
          build-essential autoconf automake libtool pkg-config \
          libffi-dev libssl-dev zlib1g-dev cmake openjdk-17-jdk

      - name: HARD CLEAN (robust)
        run: |
          # Remove only the build directories
          rm -rf .buildozer
          # Force remove potential hidden platform directories
          sudo rm -rf ~/.buildozer
          sudo rm -rf .python-for-android
          # This ensures we don't have lingering locks

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer
          # Buildozer will automatically fetch the correct python-for-android
          # based on your buildozer.spec configuration.

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel
       
      - name: Force stable p4a environment
        run: |
         echo "P4A_PYTHON_VERSION=3.10" >> $GITHUB_ENV
         echo "P4A_BRANCH=release-2023.09.16" >> $GITHUB_ENV

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerV10-APK
          path: bin/*.apk
