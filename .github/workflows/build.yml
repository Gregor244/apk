name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      #
      # PYTHON 3.11
      #
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      #
      # JAVA 17
      #
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      #
      # SYSTEM PACKAGES
      #
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache

      #
      # CLEAN
      #
      - name: Clean caches
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.gradle
          rm -rf ~/.cache/pip

      #
      # BUILD TOOLS
      #
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel

          pip install \
            cython==0.29.36 \
            buildozer==1.5.0

      #
      # FORCE CLEAN ENV
      #
      - name: Remove Android SDK leftovers
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true

      #
      # BUILD APK
      #
      - name: Build APK
        run: |
          buildozer android clean
          buildozer android debug

      #
      # UPLOAD APK
      #
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
