name: Build StockScannerPro APK

env:
  BUILDOZER_WARN_ON_ROOT: 0
  P4A_RELEASE_KEYSTORE: ""
  BUILDOZER_ALLOW_AAB: 0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
         sudo apt install -y \
          zip unzip tar wget curl git \
          build-essential autoconf automake libtool pkg-config \
          libltdl-dev \
          zlib1g-dev libncurses5-dev libffi-dev libssl-dev cmake \
          openjdk-17-jdk

      - name: Clean caches
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.gradle/caches
          rm -rf ~/.local/share/python-for-android

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.33
          pip install buildozer
          pip install virtualenv

          which buildozer
          buildozer --version

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerPro-APK
          path: bin/*.apk
