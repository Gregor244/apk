name: Build StockScannerV10 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEBIAN_FRONTEND: noninteractive
      MAKEFLAGS: -j1
      P4A_PYTHON_VERSION: "3.10"
      PIP_NO_BUILD_ISOLATION: "1"
      PYTHONNOUSERSITE: "1"
      SETUPTOOLS_USE_DISTUTILS: "stdlib"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            zip unzip git wget curl \
            build-essential \
            autoconf automake libtool pkg-config m4 \
            libffi-dev libssl-dev zlib1g-dev \
            cmake


      - name: Setup Android NDK 25b
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip

          unzip -q android-ndk-r25b-linux.zip

          mv android-ndk-r25b $HOME/android-ndk

          echo "ANDROID_NDK_HOME=$HOME/android-ndk" >> $GITHUB_ENV
          echo "ANDROID_NDK=$HOME/android-ndk" >> $GITHUB_ENV
          echo "ANDROIDNDK=$HOME/android-ndk" >> $GITHUB_ENV

      - name: Clean previous builds
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.gradle/caches
          rm -rf ~/.cache/pip
          rm -rf ~/.python-for-android


      - name: Install Buildozer stack
        run: |
          python -m pip install --upgrade pip==23.2.1
          python -m pip install setuptools==65.7.0 wheel==0.38.4 appdirs==1.4.4
          python -m pip install cython==0.29.33 buildozer==1.5.0


      - name: Force old Cython
        run: |
          python -m pip install "Cython<3"


      - name: Recreate p4a directory
        run: |
          mkdir -p .buildozer/android/platform

      - name: Build APK
        run: |
          buildozer android update
          buildozer android debug



      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerV10-APK
          path: bin/*.apk
