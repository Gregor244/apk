name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            zip \
            unzip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential \
            git \
            wget \
            curl \
            python3-pip

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip

          pip install \
            cython==0.29.33 \
            buildozer==1.5.0

      - name: Clean old caches
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.cache/buildozer
          rm -rf ~/.cache/python-for-android
          rm -rf bin

      - name: Set Android environment
        run: |
          echo "ANDROIDSDK=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROIDNDK=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROIDAPI=33" >> $GITHUB_ENV
          echo "NDKAPI=24" >> $GITHUB_ENV

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: stockscanner-apk
          path: bin/*.apk
