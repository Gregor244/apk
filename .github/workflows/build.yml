name: Build StockScannerV10 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      DEBIAN_FRONTEND: noninteractive
      MAKEFLAGS: -j1

      # 🔥 KLUCZOWE FIXY
      P4A_PYTHON_VERSION: "3.10"
      PIP_NO_BUILD_ISOLATION: "1"
      PIP_USE_PEP517: "0"
      PIP_BREAK_SYSTEM_PACKAGES: "1"
      PYTHONNOUSERSITE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip git wget curl \
            build-essential \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev zlib1g-dev \
            cmake

      - name: Install Python build stack (IMPORTANT FIX)
        run: |
          python -m pip install --upgrade pip==23.2.1

          python -m pip install \
            setuptools==65.7.0 \
            wheel==0.38.4 \
            cython==0.29.33 \
            appdirs==1.4.4 \
            virtualenv==20.25.0

          # 🔥 KLUCZ: NIE POZWALAMY NA BUILD ISOLATION
          python -m pip install \
            "buildozer==1.5.0" \
            "python-for-android==2023.9.16" \
            --no-build-isolation \
            --no-use-pep517

      - name: Force stable Cython (CRITICAL)
        run: |
          python -m pip install "Cython<3"

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          mv android-ndk-r25b $HOME/android-ndk

          echo "ANDROID_NDK_HOME=$HOME/android-ndk" >> $GITHUB_ENV
          echo "ANDROID_NDK=$HOME/android-ndk" >> $GITHUB_ENV

      - name: Clean build caches
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.cache/pip
          rm -rf ~/.python-for-android

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerV10-APK
          path: bin/*.apk
