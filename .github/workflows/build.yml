name: Android Build Stable

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev \
            build-essential \
            cmake \
            libffi-dev \
            libssl-dev \
            ccache \
            liblzma-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            wget curl \
            llvm gettext autopoint

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip

          pip install \
            buildozer==1.5.0 \
            cython==0.29.36

      - name: Clean old builds
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf bin

      # ==========================================
      # INIT p4a
      # ==========================================

      - name: Initialize buildozer
        run: |
          buildozer init || true
          buildozer android update || true

      # ==========================================
      # FORCE DOWNLOAD p4a
      # ==========================================

      - name: Prepare python-for-android
        run: |
          mkdir -p .buildozer/android/platform

          if [ ! -d ".buildozer/android/platform/python-for-android" ]; then
            git clone https://github.com/kivy/python-for-android.git \
              .buildozer/android/platform/python-for-android
          fi

      # ==========================================
      # PATCH LIBTHORVG
      # ==========================================

      - name: Patch libthorvg
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path(".buildozer/android/platform/python-for-android/pythonforandroid/recipes/libthorvg/__init__.py")

          print("PATCH FILE:", p)

          txt = p.read_text()

          old = "clang_lib_dir = glob(pattern)[0]"

          new = '''
                  matches = glob(pattern)

                  if not matches:
                      print("SKIP libthorvg")
                      return

                  clang_lib_dir = matches[0]
          '''

          if old in txt:
              txt = txt.replace(old, new)
              p.write_text(txt)
              print("PATCH APPLIED")
          else:
              print("PATTERN NOT FOUND")
          PY

      # ==========================================
      # BUILD APK
      # ==========================================

      - name: Build APK
        run: |
          buildozer android debug

      # ==========================================
      # UPLOAD
      # ==========================================

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
