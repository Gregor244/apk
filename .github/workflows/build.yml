name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      P4A_PYTHON_VERSION: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # PYTHON 3.11
      # -----------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -----------------------------
      # JAVA 17
      # -----------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # -----------------------------
      # SYSTEM DEPS
      # -----------------------------
      - name: Install system dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            cmake \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache

      # -----------------------------
      # CLEAN ALL CACHES
      # -----------------------------
      - name: Clean caches
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.gradle
          rm -rf ~/.cache/pip

      # -----------------------------
      # PYTHON DEPS
      # -----------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel

          pip install \
            cython==0.29.36 \
            buildozer

      # -----------------------------
      # REMOVE BROKEN NDKS
      # -----------------------------
      - name: Remove GitHub Android NDK
        run: |
          sudo rm -rf /usr/local/lib/android/sdk/ndk || true

      # -----------------------------
      # VERIFY SPEC
      # -----------------------------
      - name: Verify buildozer.spec
        run: |
          cat buildozer.spec

      # -----------------------------
      # BUILD APK
      # -----------------------------
      - name: Build APK
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_LATEST_HOME: ""
          ANDROID_NDK: ""
        run: |
          set -o pipefail

          buildozer android debug 2>&1 | tee build_log.txt

      # -----------------------------
      # ERROR EXTRACTOR
      # -----------------------------
      - name: Extract errors
        if: failure()
        run: |
          echo "========== TRACEBACK =========="
          grep -i -B 5 -A 20 "Traceback" build_log.txt || true

          echo "========== RECIPE FAILED =========="
          grep -i -B 5 -A 20 "Recipe failed" build_log.txt || true

          echo "========== LAST 100 LINES =========="
          tail -n 100 build_log.txt || true

      # -----------------------------
      # UPLOAD LOGS
      # -----------------------------
      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: |
            build_log.txt
            .buildozer/**/*.log
            .buildozer/**/*.txt
