name: Build StockScannerV10 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y zip unzip git wget curl \
            build-essential autoconf automake libtool pkg-config \
            libffi-dev libssl-dev zlib1g-dev cmake openjdk-17-jdk

      - name: HARD CLEAN (important)
        run: |
          rm -rf .buildozer
          rm -rf ~/.buildozer
          rm -rf ~/.python-for-android
          rm -rf ~/.gradle/caches

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Buildozer stack
        run: |
          pip install cython==0.29.36
          pip install buildozer==1.5.0 virtualenv

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerV10-APK
          path: bin/*.apk
