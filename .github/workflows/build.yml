name: Build StockScannerV10 APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Limit build threads
        run: |
          echo "MAKEFLAGS=-j1" >> $GITHUB_ENV
          
      - name: Setup Android NDK 25b
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip android-ndk-r25b-linux.zip
          mv android-ndk-r25b $HOME/android-ndk
          echo "ANDROID_NDK_HOME=$HOME/android-ndk" >> $GITHUB_ENV
          echo "ANDROID_NDK=$HOME/android-ndk" >> $GITHUB_ENV
          echo "ANDROIDNDK=$HOME/android-ndk" >> $GITHUB_ENV

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Fix autotools environment
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config m4

          echo "ACLOCAL_PATH=/usr/share/aclocal" >> $GITHUB_ENV
          echo "LIBTOOLIZE=libtoolize" >> $GITHUB_ENV

      - name: Install stable build tools
        run: |
         sudo apt-get update
         sudo apt-get install -y autoconf automake libtool pkg-config
        
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y zip unzip git wget curl \
          build-essential autoconf automake libtool pkg-config \
          libffi-dev libssl-dev zlib1g-dev cmake openjdk-17-jdk

      - name: HARD CLEAN (Maximum)
        run: |
          # Remove local build directory
          rm -rf .buildozer
          # Remove global caches that often trap bad builds
          rm -rf ~/.buildozer
          rm -rf ~/.gradle/caches
          rm -rf ~/.cache/pip
          # Force clean p4a if it exists
          rm -rf ~/.python-for-android
          # Clear out any existing android-sdk or ndk remnants
          sudo rm -rf /usr/local/lib/android/sdk/ndk/*

      - name: Install Buildozer
        run: |
          pip install pip==23.2.1
          pip install --no-build-isolation setuptools==65.7.0 wheel==0.38.4
          pip install cython==0.29.33
          pip install "python-for-android<2024"
          pip install buildozer

      - name: Patch libffi autotools
        run: |
          export AUTOM4TE=/usr/bin/autom4te
          export ACLOCAL_PATH=/usr/share/aclocal
          export LIBTOOLIZE=libtoolize

      - name: Force clean libffi build
        run: |
          rm -rf .buildozer/android/platform/build-*
    
      - name: Force stable p4a environment
        run: |
         echo "P4A_PYTHON_VERSION=3.10" >> $GITHUB_ENV
         echo "P4A_BRANCH=develop" >> $GITHUB_ENV

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StockScannerV10-APK
          path: bin/*.apk
